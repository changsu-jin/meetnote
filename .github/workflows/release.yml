name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update manifest version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd plugin
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Build plugin
        working-directory: plugin
        run: |
          npm ci
          npm run build

      - name: Package plugin
        run: |
          mkdir -p dist
          cp plugin/main.js dist/
          cp plugin/manifest.json dist/
          cp plugin/styles.css dist/ 2>/dev/null || true
          cd dist && zip -r ../meetnote-plugin.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            meetnote-plugin.zip
            dist/main.js
            dist/manifest.json
            dist/styles.css
          body: |
            ## MeetNote ${{ github.ref_name }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Plugin Installation (BRAT)
            1. Install BRAT plugin in Obsidian
            2. Add this repository URL in BRAT settings
            3. Enable MeetNote in Community Plugins

            ### Server Setup
            ```bash
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/backend/docker-compose.yml
            docker compose up -d
            ```
